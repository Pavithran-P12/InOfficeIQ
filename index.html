<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InOfficeIQ - Work Days Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1><span class="calendar-icon">📅</span>InOfficeIQ</h1>
            <p class="app-subtitle">Plan your office days smartly</p>
        </header>

        <div class="target-row">
            <label for="target-days">🎯 Target Office Days</label>
            <div class="target-input-wrap">
                <button class="target-step" id="target-minus">−</button>
                <input type="number" id="target-days" name="target-days" value="10" min="1">
                <button class="target-step" id="target-plus">+</button>
            </div>
        </div>

        <div class="month-nav-row">
            <div class="month-navigation">
                <button id="prev-month" class="nav-btn" aria-label="Previous month">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div id="current-month-display">March 2026</div>
                <button id="next-month" class="nav-btn" aria-label="Next month">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <button class="download-btn" id="download-btn" onclick="downloadAsImage()" title="Download as image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>

        <div class="stats-bar">
            <div class="stat-card stat-remaining">
                <div class="stat-value" id="big-remaining-count">0</div>
                <div class="stat-label">Remaining</div>
            </div>
            <div class="stat-card stat-office">
                <div class="stat-value" id="days-selected">0</div>
                <div class="stat-label">Office</div>
            </div>
            <div class="stat-card stat-holidays">
                <div class="stat-value" id="holiday-count">0</div>
                <div class="stat-label">Holidays</div>
            </div>
            <div class="stat-card stat-leaves">
                <div class="stat-value" id="leave-count">0</div>
                <div class="stat-label">Leaves</div>
            </div>
        </div>

        <div class="mode-selector">
            <div class="mode-title">Select type &amp; tap dates</div>
            <div class="mode-buttons">
                <button class="mode-btn mode-office" data-mode="office" onclick="setMode('office')"><span class="mode-icon">🏢</span><span class="mode-label">Office</span></button>
                <button class="mode-btn mode-wfh active" data-mode="wfh" onclick="setMode('wfh')"><span class="mode-icon">💻</span><span class="mode-label">WFH</span></button>
                <button class="mode-btn mode-holiday" data-mode="holiday" onclick="setMode('holiday')"><span class="mode-icon">🏖️</span><span class="mode-label">Holiday</span></button>
                <button class="mode-btn mode-leave" data-mode="leave" onclick="setMode('leave')"><span class="mode-icon">🏠</span><span class="mode-label">Leave</span></button>
                <button class="mode-btn mode-clear" data-mode="clear" onclick="setMode('clear')"><span class="mode-icon">✕</span><span class="mode-label">Clear</span></button>
            </div>
        </div>
        
        <div id="capture-area">
        <div class="calendar-container" id="calendar-container">
            <table class="calendar">
                <tr class="calendar-header">
                    <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                </tr>
            </table>
        </div>

        <div class="legend-bar">
            <span class="legend-chip weekend-chip">Weekend</span>
            <span class="legend-chip holiday-chip">Holiday</span>
            <span class="legend-chip leave-chip">Leave</span>
            <span class="legend-chip office-chip">Office</span>
            <span class="legend-chip wfh-chip">WFH</span>
        </div>
        </div>

        <div class="summary">
            <div class="summary-box">
                <div class="summary-row"><span>Working Days</span><strong id="total-workdays">0</strong></div>
                <div class="summary-row"><span>Required Office</span><strong id="target-display">10</strong></div>
                <div class="summary-row"><span>WFH Eligible</span><strong id="wfh-days">0</strong></div>
                <div class="summary-row"><span>Remaining</span><strong id="remaining-days" class="highlight">10</strong></div>
            </div>
        </div>
        
        <footer class="footer">
            <div class="footer-credit">
                Made with <span class="heart">❤</span> by <a href="https://github.com/Pavithran-P12" target="_blank">Pavithran</a>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
